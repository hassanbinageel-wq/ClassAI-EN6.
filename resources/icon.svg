<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.55" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd76a"/>
      <stop offset="1" stop-color="#f0b429"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- chat/book card -->
  <g filter="url(#soft)">
    <rect x="222" y="262" width="580" height="430" rx="58" fill="#ffffff"/>
    <!-- speech tail -->
    <path d="M360 692 L360 792 L470 692 Z" fill="#ffffff"/>
  </g>

  <!-- book spine line -->
  <rect x="506" y="306" width="14" height="300" rx="7" fill="#e7e9f3"/>

  <!-- EN wordmark -->
  <text x="512" y="540" text-anchor="middle" font-family="'Plus Jakarta Sans', 'Segoe UI', Arial, sans-serif" font-size="232" font-weight="800" fill="#4f46e5" letter-spacing="-6">EN</text>

  <!-- level pills (book pages hint) -->
  <rect x="300" y="600" width="180" height="20" rx="10" fill="#eef1fb"/>
  <rect x="546" y="600" width="178" height="20" rx="10" fill="#eef1fb"/>

  <!-- AI spark -->
  <g transform="translate(742 296)">
    <circle cx="0" cy="0" r="92" fill="url(#gold)"/>
    <path d="M0 -56 L14 -16 L54 -16 L22 8 L34 48 L0 24 L-34 48 L-22 8 L-54 -16 L-14 -16 Z" fill="#3730a3"/>
  </g>
</svg>
