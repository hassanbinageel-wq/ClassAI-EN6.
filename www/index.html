<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#4f46e5" />
<title>ClassAI (EN 6)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --indigo:#4f46e5; --indigo-2:#6366f1; --indigo-d:#4338ca;
  --gold:#f0b429; --gold-d:#d9981a;
  --ink:#0f1729; --ink-2:#1e293b;
  --paper:#f5f6fb; --card:#ffffff; --line:#e7e9f3;
  --text:#1a2238; --muted:#6b7693; --muted-2:#9aa3bd;
  --green:#16a34a; --red:#e11d48; --amber:#f59e0b;
  --u1:#38bdf8; --u2:#f472b6; --u3:#fbbf24; --u4:#34d399; --u5:#fb923c; --u6:#a78bfa;
  --radius:20px; --radius-sm:14px;
  --shadow:0 10px 30px -12px rgba(20,28,60,.18);
  --shadow-lg:0 24px 60px -20px rgba(20,28,60,.32);
  --accent:var(--indigo);
  --ui:'Plus Jakarta Sans','Cairo',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  --ar:'Cairo',system-ui,-apple-system,Segoe UI,Tahoma,sans-serif;
}
[data-theme="dark"]{
  --paper:#0b1020; --card:#141b2e; --line:#26304a;
  --text:#e8ecf7; --muted:#9aa6c4; --muted-2:#6c7794;
  --ink:#e8ecf7; --shadow:0 10px 30px -12px rgba(0,0,0,.55);
  --shadow-lg:0 24px 60px -20px rgba(0,0,0,.7);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{font-family:var(--ar);background:var(--paper);color:var(--text);-webkit-font-smoothing:antialiased;overflow:hidden}
.ltr{direction:ltr;unicode-bidi:isolate;text-align:left}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::-webkit-scrollbar{width:0;height:0}
svg{display:block}

#app{display:flex;flex-direction:column;height:100dvh;max-width:560px;margin:0 auto;position:relative;background:var(--paper)}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px 16px 100px;scroll-behavior:smooth}

/* ---------- page head ---------- */
.page-head{display:flex;align-items:center;gap:12px;margin:2px 0 14px;--uc:var(--indigo)}
.page-head .back{width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;color:var(--text);box-shadow:var(--shadow);flex:none;font-size:16px}
.page-head .back:active{transform:scale(.93)}
.page-head h2{font-family:var(--ui);font-size:19px;font-weight:800;margin:0;flex:1;letter-spacing:-.3px}
.counter{font-family:var(--ui);font-weight:700;font-size:13px;color:var(--muted);background:var(--card);border:1px solid var(--line);padding:5px 11px;border-radius:20px}
.ghost-btn{font-family:var(--ar);font-weight:700;font-size:13px;color:var(--muted);padding:7px 13px;border-radius:11px;border:1px solid var(--line)}
.ghost-btn:active{background:var(--paper)}
.done-pill{font-family:var(--ui);font-weight:700;font-size:12px;color:var(--green);background:rgba(22,163,74,.12);padding:5px 11px;border-radius:20px;display:flex;align-items:center;gap:4px}
.sec-title{font-family:var(--ui);font-weight:800;font-size:15px;margin:22px 2px 12px;letter-spacing:-.2px}

/* ---------- home hero ---------- */
.hero{border-radius:24px;padding:20px;color:#fff;position:relative;overflow:hidden;background:linear-gradient(135deg,var(--indigo) 0%,var(--indigo-d) 62%,#3730a3 100%);box-shadow:0 18px 40px -18px rgba(79,70,229,.6)}
.hero::after{content:"";position:absolute;inset:0;background:radial-gradient(120px 120px at 90% 4%,rgba(240,180,41,.4),transparent 70%),radial-gradient(200px 200px at 6% 116%,rgba(255,255,255,.16),transparent 70%);pointer-events:none}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1}
.hello{font-family:var(--ar);font-weight:900;font-size:21px;line-height:1.25}
.hero .sub{font-size:12.5px;opacity:.9;font-weight:600;margin-top:3px}
.streak{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.2);border-radius:13px;padding:7px 11px;font-family:var(--ui);font-weight:800;font-size:15px;backdrop-filter:blur(6px)}
.streak svg{color:var(--gold)}
.lvbar{height:9px;border-radius:6px;background:rgba(255,255,255,.22);margin:18px 0 7px;overflow:hidden;position:relative;z-index:1}
.lvbar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--gold),#ffd766);box-shadow:0 0 12px rgba(240,180,41,.6)}
.lvmeta{display:flex;justify-content:space-between;font-family:var(--ui);font-weight:700;font-size:12px;opacity:.95;position:relative;z-index:1}

/* ---------- stat row ---------- */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0}
.stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 6px;text-align:center;box-shadow:var(--shadow)}
.stat-n{font-family:var(--ui);font-weight:800;font-size:21px;letter-spacing:-.5px}
.stat-n small{font-size:12px;color:var(--muted-2);font-weight:700}
.stat-l{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}

/* ---------- CTA ---------- */
.card-cta{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow);margin-bottom:4px}
.card-cta:active{transform:scale(.99)}
.cta-ic{width:48px;height:48px;border-radius:14px;display:grid;place-items:center;flex:none}
.cta-tx{flex:1;min-width:0}
.cta-k{font-size:11.5px;color:var(--muted);font-weight:700}
.cta-v{font-family:var(--ui);font-weight:800;font-size:15px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cta-go{width:34px;height:34px;border-radius:11px;background:var(--indigo);color:#fff;display:grid;place-items:center;flex:none}

/* ---------- quick actions ---------- */
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 0 4px}
.qbtn{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px 4px;display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--text);box-shadow:var(--shadow);font-family:var(--ar);font-weight:700;font-size:12px;position:relative}
.qbtn:active{transform:scale(.95)}
.qbtn svg{color:var(--indigo)}
.qbtn i{position:absolute;top:7px;left:9px;background:var(--red);color:#fff;font-style:normal;font-size:10px;font-weight:800;min-width:17px;height:17px;border-radius:9px;display:grid;place-items:center;padding:0 4px}

/* ---------- units grid ---------- */
.units-grid{display:flex;flex-direction:column;gap:11px}
.unit-card{display:flex;gap:13px;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:var(--shadow);position:relative;overflow:hidden;border-right:4px solid var(--uc)}
.unit-card:active{transform:scale(.99)}
.uc-no{width:46px;height:46px;border-radius:14px;background:color-mix(in srgb,var(--uc) 16%,transparent);color:var(--uc);display:grid;place-items:center;font-family:var(--ui);font-weight:800;font-size:21px;flex:none}
.uc-body{flex:1;min-width:0}
.uc-title{font-family:var(--ar);font-weight:700;font-size:15.5px;line-height:1.3}
.uc-en{font-family:var(--ui);font-weight:600;font-size:12px;color:var(--muted);margin:1px 0 9px}
.uc-bar{height:7px;border-radius:5px;background:var(--paper);overflow:hidden;border:1px solid var(--line)}
.uc-bar>div{height:100%;background:var(--uc);border-radius:5px;transition:width .4s}
.uc-meta{font-size:11px;color:var(--muted);font-weight:600;margin-top:6px}

/* readers */
.reader-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px;box-shadow:var(--shadow);margin-bottom:10px}
.reader-card:active{transform:scale(.99)}
.rc-ic{width:42px;height:42px;border-radius:12px;background:rgba(79,70,229,.12);color:var(--indigo);display:grid;place-items:center;flex:none}
.rc-t{font-family:var(--ar);font-weight:700;font-size:14.5px}
.rc-s{font-family:var(--ui);font-size:11.5px;color:var(--muted);font-weight:600}

/* ---------- unit hero ---------- */
.unit-hero{border-radius:20px;padding:18px;color:#fff;background:linear-gradient(135deg,var(--uc),color-mix(in srgb,var(--uc) 60%,#000));box-shadow:0 16px 36px -18px color-mix(in srgb,var(--uc) 70%,transparent);margin-bottom:16px;--uc:var(--indigo)}
.uh-title{font-family:var(--ar);font-weight:900;font-size:20px}
.uh-en{font-family:var(--ui);font-weight:600;font-size:12.5px;opacity:.92;margin:2px 0 14px}
.uh-bar{height:8px;border-radius:5px;background:rgba(255,255,255,.28);overflow:hidden}
.uh-bar>div{height:100%;background:#fff;border-radius:5px}
.uh-meta{font-family:var(--ui);font-weight:600;font-size:11.5px;margin-top:7px;opacity:.95}

/* lesson list */
.lesson-list{display:flex;flex-direction:column;gap:9px}
.lesson-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:15px;padding:12px;box-shadow:var(--shadow)}
.lesson-row:active{transform:scale(.99)}
.lesson-row.done{background:color-mix(in srgb,var(--green) 6%,var(--card))}
.lr-ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;flex:none}
.lr-body{flex:1;min-width:0}
.lr-title{font-family:var(--ar);font-weight:700;font-size:14.5px;line-height:1.3}
.lr-sub{font-family:var(--ui);font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px}
.lr-best{color:var(--green);font-weight:800}
.lr-go{width:30px;height:30px;border-radius:10px;background:var(--paper);border:1px solid var(--line);color:var(--muted);display:grid;place-items:center;flex:none}

/* ---------- lesson top + tabs ---------- */
.lesson-top{background:var(--card);border:1px solid var(--line);border-right:4px solid var(--uc);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);margin-bottom:12px;--uc:var(--indigo)}
.lt-title{font-family:var(--ar);font-weight:900;font-size:18px;line-height:1.3}
.lt-en{font-family:var(--ui);font-weight:600;font-size:13px;color:var(--muted);margin-top:2px}
.tabs{display:flex;gap:7px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px}
.tab{flex:none;font-family:var(--ar);font-weight:700;font-size:13px;padding:9px 15px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--muted);white-space:nowrap}
.tab.on{background:var(--indigo);color:#fff;border-color:var(--indigo);box-shadow:0 8px 18px -10px rgba(79,70,229,.7)}

/* ---------- intro ---------- */
.intro-card{background:linear-gradient(135deg,rgba(79,70,229,.08),rgba(99,102,241,.04));border:1px solid var(--line);border-radius:16px;padding:15px;margin-bottom:14px}
.intro-ar{font-family:var(--ar);font-weight:700;font-size:15px;line-height:1.6}
.intro-en{font-family:var(--ui);font-size:13px;color:var(--muted);font-weight:500;margin-top:6px;line-height:1.5}
.intro-mini{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:11px 14px;margin-bottom:12px;font-family:var(--ar);font-weight:600;font-size:13.5px;color:var(--muted);line-height:1.6}

/* ---------- explain card ---------- */
.explain-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:0;box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px;--uc:var(--indigo)}
.explain-head{display:flex;align-items:center;gap:8px;font-family:var(--ui);font-weight:800;font-size:14px;color:#fff;background:linear-gradient(135deg,var(--uc),color-mix(in srgb,var(--uc) 55%,#000));padding:13px 16px}
.explain-body{padding:16px}
.explain-body p{margin:0 0 12px;font-family:var(--ar);font-size:15px;line-height:1.95;color:var(--text)}
.explain-body p:last-child{margin-bottom:0}
.explain-actions{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.ea{flex:1;min-width:calc(50% - 4px);font-family:var(--ar);font-weight:700;font-size:13px;padding:11px 10px;border-radius:13px;background:var(--card);border:1px solid var(--line);color:var(--text);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;gap:7px}
.ea:active{transform:scale(.97)}
.ea svg{color:var(--indigo);flex:none}
.ea.wide{min-width:100%;background:linear-gradient(135deg,rgba(79,70,229,.1),rgba(99,102,241,.05));color:var(--indigo);border-color:rgba(79,70,229,.25)}
.finish-btn{width:100%;font-family:var(--ar);font-weight:800;font-size:15px;padding:15px;border-radius:15px;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 12px 26px -12px rgba(79,70,229,.7)}
.finish-btn:active{transform:scale(.98)}
.finish-btn.is-done{background:var(--card);color:var(--green);border:1px solid color-mix(in srgb,var(--green) 30%,var(--line));box-shadow:var(--shadow)}

/* ---------- text / lines ---------- */
.lbar{display:flex;gap:8px;overflow-x:auto;margin-bottom:13px;padding-bottom:2px}
.tool{flex:none;font-family:var(--ar);font-weight:700;font-size:12.5px;padding:9px 13px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--text);box-shadow:var(--shadow);display:flex;align-items:center;gap:6px;white-space:nowrap}
.tool:active{transform:scale(.96)}
.tool svg{color:var(--indigo)}
.lnlist{display:flex;flex-direction:column;gap:9px}
.lnrow{display:flex;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 13px;box-shadow:var(--shadow)}
.ln-main{flex:1;min-width:0}
.ln-sp{display:inline-block;font-family:var(--ui);font-weight:800;font-size:11px;color:var(--indigo);background:rgba(79,70,229,.1);padding:2px 8px;border-radius:8px;margin-bottom:6px}
.ln-en{font-family:var(--ui);font-size:14.5px;line-height:1.55;font-weight:500}
.ln-side{display:flex;flex-direction:column;gap:6px;align-items:center;flex:none}
.spk{width:34px;height:34px;border-radius:11px;background:var(--paper);border:1px solid var(--line);color:var(--indigo);display:grid;place-items:center;flex:none}
.spk:active{transform:scale(.92);background:rgba(79,70,229,.1)}
.spk.sm{width:26px;height:26px;border-radius:8px;display:inline-grid;vertical-align:middle}
.spk.lg{width:46px;height:46px;border-radius:14px;background:rgba(79,70,229,.12)}
.tr{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);font-family:var(--ar);font-size:14px;line-height:1.6;color:var(--text);font-weight:600}
.tr.show{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:none}}
.trbtn{font-family:var(--ar);font-weight:700;font-size:11px;padding:6px 9px;border-radius:9px;background:rgba(79,70,229,.09);color:var(--indigo);border:1px solid rgba(79,70,229,.18);display:flex;align-items:center;gap:4px;white-space:nowrap}
.trbtn.on{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.trbtn svg{flex:none}

/* ---------- grammar ---------- */
.gcard{background:var(--card);border:1px solid var(--line);border-right:4px solid var(--uc);border-radius:16px;padding:15px;box-shadow:var(--shadow);margin-bottom:12px;--uc:var(--indigo)}
.g-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:8px}
.g-point{font-family:var(--ui);font-weight:800;font-size:15px;color:var(--uc)}
.g-ar{font-family:var(--ar);font-weight:700;font-size:14px}
.g-note{font-family:var(--ar);font-size:14px;line-height:1.7;color:var(--text);background:var(--paper);border-radius:11px;padding:11px 13px;margin-bottom:11px}
.g-ex{display:flex;flex-direction:column;gap:8px}
.gex{display:flex;gap:9px;align-items:flex-start;background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:10px 12px}
.gex-main{flex:1;min-width:0}
.gex-en{font-family:var(--ui);font-size:13.5px;line-height:1.5;font-weight:500}
.gex-side{display:flex;flex-direction:column;gap:5px;align-items:center;flex:none}

/* ---------- vocab ---------- */
.vlist{display:flex;flex-direction:column;gap:10px}
.vrow{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 14px;box-shadow:var(--shadow)}
.v-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.v-en{font-family:var(--ui);font-weight:700;font-size:16px;display:flex;align-items:center;gap:4px}
.v-ar{font-family:var(--ar);font-weight:700;font-size:15px;color:var(--indigo)}
.v-ipa{font-family:var(--ui);font-size:12.5px;color:var(--muted-2);margin-top:3px}
.v-ex{display:flex;gap:8px;align-items:flex-start;margin-top:9px;padding-top:9px;border-top:1px solid var(--line)}
.vex-main{flex:1;min-width:0;font-family:var(--ui);font-size:13px;color:var(--muted);line-height:1.5}
.vex-side{display:flex;flex-direction:column;gap:5px;align-items:center;flex:none}

/* ---------- flashcards ---------- */
.fc-bar{height:7px;border-radius:5px;background:var(--card);border:1px solid var(--line);overflow:hidden;margin:4px 0 18px}
.fc-bar>div{height:100%;background:var(--indigo);border-radius:5px;transition:width .3s}
.flashcard{perspective:1400px;height:300px;margin-bottom:16px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,.2,.2,1)}
.flashcard.flip .fc-inner{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;box-shadow:var(--shadow-lg)}
.fc-front{background:linear-gradient(150deg,var(--card),var(--paper));border:1px solid var(--line)}
.fc-back{background:linear-gradient(150deg,var(--indigo),var(--indigo-d));color:#fff;transform:rotateY(180deg)}
.fc-word{font-family:var(--ui);font-weight:800;font-size:34px;letter-spacing:-.5px;text-align:center}
.fc-ipa{font-family:var(--ui);font-size:15px;color:var(--muted)}
.fc-hint{position:absolute;bottom:16px;font-family:var(--ar);font-size:12px;color:var(--muted-2);font-weight:600}
.fc-mean{font-family:var(--ar);font-weight:800;font-size:30px;text-align:center}
.fc-ex{font-family:var(--ui);font-size:14px;opacity:.95;text-align:center;line-height:1.5}
.fc-exar{font-family:var(--ar);font-size:14px;opacity:.85;text-align:center}
.fc-grade{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grade{font-family:var(--ar);font-weight:800;font-size:15px;padding:15px;border-radius:15px;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:var(--shadow)}
.grade.bad{background:var(--card);border:1px solid var(--line);color:var(--muted)}
.grade.good{background:var(--green);color:#fff}
.grade:active{transform:scale(.97)}
.fc-tip{text-align:center;font-family:var(--ar);font-size:13px;color:var(--muted);font-weight:600;padding:12px}

/* ---------- quiz ---------- */
.quiz-head{margin-bottom:16px}
.qh-bar{height:7px;border-radius:5px;background:var(--card);border:1px solid var(--line);overflow:hidden}
.qh-bar>div{height:100%;background:linear-gradient(90deg,var(--indigo),var(--indigo-2));border-radius:5px;transition:width .35s}
.qh-meta{display:flex;justify-content:space-between;font-family:var(--ui);font-weight:700;font-size:12px;color:var(--muted);margin-top:7px}
.qh-type{color:var(--indigo);background:rgba(79,70,229,.1);padding:2px 10px;border-radius:10px}
.quiz-q{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:var(--shadow)}
.q-prompt{font-family:var(--ar);font-weight:800;font-size:24px;text-align:center;margin-bottom:6px}
.q-prompt.ltr{font-family:var(--ui)}
.q-sub{font-family:var(--ar);font-size:13px;color:var(--muted);text-align:center;font-weight:600;margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:9px}
.opt{font-family:var(--ar);font-weight:700;font-size:15px;padding:14px 16px;border-radius:13px;background:var(--paper);border:1.5px solid var(--line);color:var(--text);text-align:right;transition:.15s}
.opt.ltr{text-align:left;font-family:var(--ui)}
.opt:active:not(:disabled){transform:scale(.99);border-color:var(--indigo)}
.opt:disabled{opacity:1}
.opt.correct{background:color-mix(in srgb,var(--green) 14%,var(--card));border-color:var(--green);color:var(--green)}
.opt.wrong{background:color-mix(in srgb,var(--red) 12%,var(--card));border-color:var(--red);color:var(--red)}
.next-btn,.check-btn{width:100%;font-family:var(--ar);font-weight:800;font-size:15px;padding:14px;border-radius:14px;background:var(--indigo);color:#fff;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:14px;box-shadow:0 12px 26px -12px rgba(79,70,229,.7)}
.next-btn:active,.check-btn:active{transform:scale(.98)}
.check-btn:disabled{opacity:.45;box-shadow:none}
.fillsent{font-family:var(--ui);font-size:17px;line-height:1.8;text-align:center;background:var(--paper);border:1px solid var(--line);border-radius:13px;padding:16px;margin-bottom:16px;font-weight:500}
.blank{display:inline-block;min-width:64px;border-bottom:2.5px solid var(--indigo);margin:0 4px;font-weight:800;color:var(--indigo)}
.blank.ok{color:var(--green);border-color:var(--green)}
.blank.no{color:var(--red);border-color:var(--red)}
/* matching */
.qmatch{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.qmcol{display:flex;flex-direction:column;gap:8px}
.qmitem{font-family:var(--ar);font-weight:700;font-size:14px;padding:13px 10px;border-radius:12px;background:var(--paper);border:1.5px solid var(--line);color:var(--text);transition:.15s;min-height:48px}
.qmitem.ltr{font-family:var(--ui)}
.qmitem:active:not(:disabled){transform:scale(.97)}
.qmitem.sel{background:var(--indigo);color:#fff;border-color:var(--indigo);box-shadow:0 8px 18px -10px rgba(79,70,229,.7)}
.qmitem.done{background:color-mix(in srgb,var(--green) 12%,var(--card));border-color:var(--green);color:var(--green);opacity:.7}
/* ordering */
.qbuild{min-height:56px;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;background:var(--paper);border:1.5px dashed var(--line);border-radius:13px;padding:12px;margin-bottom:12px}
.qbuild.ok{border-color:var(--green);border-style:solid;background:color-mix(in srgb,var(--green) 7%,var(--card))}
.qbuild.no{border-color:var(--red);border-style:solid;background:color-mix(in srgb,var(--red) 6%,var(--card))}
.qbuild-ph{font-family:var(--ar);font-size:13px;color:var(--muted-2);font-weight:600;align-self:center}
.order-hint{font-family:var(--ar);font-size:13px;color:var(--muted);text-align:center;font-weight:600;margin-bottom:12px;background:var(--paper);border-radius:10px;padding:9px}
.qbank{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.chip{font-family:var(--ui);font-weight:700;font-size:14px;padding:10px 14px;border-radius:11px;background:var(--card);border:1.5px solid var(--line);color:var(--text);box-shadow:var(--shadow)}
.chip:active{transform:scale(.95)}
.chip.rm{background:var(--indigo);color:#fff;border-color:var(--indigo)}
.order-res{font-family:var(--ar);font-weight:700;font-size:14px;text-align:center;padding:12px;border-radius:12px;margin-top:4px}
.order-res.ok{color:var(--green);background:color-mix(in srgb,var(--green) 10%,var(--card));display:flex;align-items:center;justify-content:center;gap:6px}
.order-res.no{color:var(--red);background:color-mix(in srgb,var(--red) 8%,var(--card));line-height:1.6}
.order-res.no b{font-family:var(--ui)}
/* result */
.quiz-result{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:28px 20px;box-shadow:var(--shadow);text-align:center}
.qr-ring{width:128px;height:128px;border-radius:50%;margin:0 auto 18px;display:grid;place-items:center;background:conic-gradient(var(--indigo) calc(var(--p)*1%),var(--line) 0)}
.qr-ring::before{content:"";position:absolute;width:100px;height:100px;border-radius:50%;background:var(--card)}
.qr-pct{position:relative;font-family:var(--ui);font-weight:800;font-size:30px;color:var(--indigo)}
.qr-msg{font-family:var(--ar);font-weight:800;font-size:18px;margin-bottom:5px}
.qr-score{font-family:var(--ui);font-size:13px;color:var(--muted);font-weight:600;margin-bottom:18px}
.qr-actions{display:flex;gap:8px}
.quiz-empty{text-align:center;padding:40px 20px;color:var(--muted)}
.quiz-empty svg{color:var(--muted-2);margin:0 auto 14px}
.quiz-empty p{font-family:var(--ar);font-size:14px;line-height:1.7;margin-bottom:16px}

/* ---------- review ---------- */
.review-hero{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.rv-stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 8px;text-align:center;box-shadow:var(--shadow)}
.rv-stat b{font-family:var(--ui);font-weight:800;font-size:24px;color:var(--indigo);display:block}
.rv-stat span{font-family:var(--ar);font-size:11.5px;color:var(--muted);font-weight:600}
.big-btn{width:100%;font-family:var(--ar);font-weight:800;font-size:16px;padding:17px;border-radius:16px;background:linear-gradient(135deg,var(--indigo),var(--indigo-d));color:#fff;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 14px 30px -12px rgba(79,70,229,.7)}
.big-btn:active{transform:scale(.98)}
.info-card{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;font-family:var(--ar);font-size:13.5px;line-height:1.75;color:var(--muted);box-shadow:var(--shadow)}
.srs-list{display:flex;flex-direction:column;gap:7px}
.srs-row{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;box-shadow:var(--shadow)}
.srs-row .ltr{font-family:var(--ui);font-weight:700;font-size:14px;flex:1}
.srs-ar{font-family:var(--ar);font-weight:600;font-size:13px;color:var(--muted)}
.srs-box{font-family:var(--ui);font-weight:700;font-size:10.5px;padding:3px 8px;border-radius:8px;background:var(--paper);color:var(--muted-2);white-space:nowrap}
.srs-box.b0,.srs-box.b1{color:var(--amber);background:rgba(245,158,11,.12)}
.srs-box.b2,.srs-box.b3{color:var(--indigo);background:rgba(79,70,229,.1)}
.srs-box.b4,.srs-box.b5,.srs-box.b6{color:var(--green);background:rgba(22,163,74,.12)}

/* ---------- tutor ---------- */
.aibar{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:9px 13px;box-shadow:var(--shadow);margin-bottom:12px}
.aibadge{font-family:var(--ui);font-weight:700;font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
.aibadge svg{color:var(--indigo)}
.aibadge.on{color:var(--green)}
.aibadge.on svg{color:var(--green)}
.chat{display:flex;flex-direction:column;gap:11px;padding:2px 0 6px}
.msg{display:flex;gap:8px;max-width:88%}
.msg.me{align-self:flex-end;flex-direction:row-reverse}
.msg.ai{align-self:flex-start}
.ai-av{width:30px;height:30px;border-radius:10px;background:linear-gradient(135deg,var(--indigo),var(--indigo-d));color:#fff;display:grid;place-items:center;flex:none;align-self:flex-end}
.bubble{padding:11px 14px;border-radius:16px;font-size:14.5px;line-height:1.65;font-family:var(--ar);white-space:normal;word-break:break-word}
.msg.ai .bubble{background:var(--card);border:1px solid var(--line);border-bottom-right-radius:5px;box-shadow:var(--shadow)}
.msg.me .bubble{background:var(--indigo);color:#fff;border-bottom-left-radius:5px}
.bubble b{font-weight:800}
.typing{display:flex;gap:4px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 16px;align-self:flex-start;width:fit-content;box-shadow:var(--shadow)}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--muted-2);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}
.suggest{display:flex;gap:8px;overflow-x:auto;padding:10px 0;margin-top:4px}
.suggest button{flex:none;font-family:var(--ar);font-weight:600;font-size:12.5px;padding:9px 13px;border-radius:20px;background:var(--card);border:1px solid var(--line);color:var(--text);white-space:nowrap;box-shadow:var(--shadow)}
.suggest button:active{transform:scale(.96);background:rgba(79,70,229,.08)}
.composer{display:flex;gap:9px;align-items:flex-end;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:8px;box-shadow:var(--shadow);position:sticky;bottom:0}
.composer textarea{flex:1;font-family:var(--ar);font-size:14.5px;border:none;background:none;color:var(--text);resize:none;padding:8px 6px;max-height:120px;line-height:1.5;outline:none}
.composer textarea::placeholder{color:var(--muted-2)}
.send{width:44px;height:44px;border-radius:14px;background:var(--indigo);color:#fff;display:grid;place-items:center;flex:none;box-shadow:0 10px 22px -10px rgba(79,70,229,.8)}
.send:active{transform:scale(.93)}

/* ---------- profile ---------- */
.profile-hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px;text-align:center;box-shadow:var(--shadow);margin-bottom:14px}
.pf-av{width:74px;height:74px;border-radius:24px;margin:0 auto 12px;background:linear-gradient(135deg,var(--indigo),var(--indigo-d));color:#fff;display:grid;place-items:center;font-family:var(--ui);font-weight:800;font-size:32px;box-shadow:0 12px 26px -10px rgba(79,70,229,.7)}
.pf-name{font-family:var(--ar);font-weight:800;font-size:19px;display:flex;align-items:center;justify-content:center;gap:8px}
.mini{width:26px;height:26px;border-radius:9px;background:var(--paper);border:1px solid var(--line);color:var(--muted);display:inline-grid;place-items:center}
.pf-lv{font-family:var(--ui);font-weight:700;font-size:13px;color:var(--muted);margin:4px 0 12px}
.pf-bar{height:9px;border-radius:6px;background:var(--paper);border:1px solid var(--line);overflow:hidden;max-width:240px;margin:0 auto}
.pf-bar>div{height:100%;background:linear-gradient(90deg,var(--gold),#ffd766);border-radius:6px}
.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.ach{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:13px 8px;text-align:center;box-shadow:var(--shadow);opacity:.5;filter:grayscale(.7)}
.ach.on{opacity:1;filter:none;border-color:color-mix(in srgb,var(--gold) 40%,var(--line))}
.ach-ic{width:42px;height:42px;border-radius:13px;margin:0 auto 7px;display:grid;place-items:center;background:rgba(240,180,41,.14);color:var(--gold-d)}
.ach.on .ach-ic{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#fff}
.ach-n{font-family:var(--ar);font-weight:700;font-size:12px;line-height:1.25}
.ach-d{font-family:var(--ar);font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3}
.settings{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:6px 16px;box-shadow:var(--shadow)}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0;border-bottom:1px solid var(--line)}
.set-row:last-child{border-bottom:none}
.set-t{font-family:var(--ar);font-weight:700;font-size:14px}
.set-s{font-family:var(--ar);font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5}
.set-field{display:flex;gap:8px;padding:12px 0}
.set-field input{flex:1;font-family:var(--ui);font-size:13px;padding:11px 13px;border-radius:12px;border:1px solid var(--line);background:var(--paper);color:var(--text);outline:none;direction:ltr}
.set-field button{font-family:var(--ar);font-weight:700;font-size:13px;padding:0 18px;border-radius:12px;background:var(--indigo);color:#fff}
.set-ok{font-family:var(--ar);font-size:12px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:5px;padding:0 0 12px}
.danger-btn{width:100%;font-family:var(--ar);font-weight:700;font-size:14px;padding:14px;border-radius:14px;background:var(--card);border:1px solid color-mix(in srgb,var(--red) 30%,var(--line));color:var(--red);display:flex;align-items:center;justify-content:center;gap:8px;margin:18px 0 12px;box-shadow:var(--shadow)}
.danger-btn:active{transform:scale(.98)}
.footer-note{text-align:center;font-family:var(--ui);font-size:11.5px;color:var(--muted-2);font-weight:600;padding:8px 0 4px}

/* switch */
.switch{position:relative;display:inline-block;width:48px;height:28px;flex:none}
.switch.sm{width:42px;height:25px}
.switch input{opacity:0;width:0;height:0}
.sl{position:absolute;inset:0;background:var(--line);border-radius:28px;transition:.25s}
.sl::before{content:"";position:absolute;width:22px;height:22px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 2px 5px rgba(0,0,0,.2)}
.switch.sm .sl::before{width:19px;height:19px}
.switch input:checked+.sl{background:var(--indigo)}
.switch input:checked+.sl::before{transform:translateX(20px)}
.switch.sm input:checked+.sl::before{transform:translateX(17px)}

/* ---------- nav ---------- */
.nav{display:flex;background:var(--card);border-top:1px solid var(--line);padding:8px 6px max(8px,env(safe-area-inset-bottom));position:absolute;bottom:0;left:0;right:0;z-index:30}
.nav-i{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;color:var(--muted-2);font-family:var(--ar);font-weight:700;font-size:10.5px;border-radius:12px;transition:.15s}
.nav-i svg{width:23px;height:23px}
.nav-i.on{color:var(--indigo)}
.nav-i:active{transform:scale(.92)}

/* ---------- toast ---------- */
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-family:var(--ar);font-weight:700;font-size:13.5px;padding:12px 20px;border-radius:14px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.3s;z-index:100;max-width:90%;text-align:center}
[data-theme="dark"] .toast{background:#000;border:1px solid var(--line)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div id="app">
  <main id="screen"></main>
  <nav class="nav" id="nav"></nav>
</div>
<div class="toast" id="toast"></div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
